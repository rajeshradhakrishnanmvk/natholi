<!DOCTYPE html>
<html>
<head>
    <title>Test Sidebar Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1a1b26;
            color: #e2e8f0;
        }
        
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #16161e;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        
        .sidebar-header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #667eea;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        
        .bots-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }
        
        .bot-item {
            padding: 0.875rem;
            background: #24283b;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
        
        .bot-item:hover {
            background: #292e42;
        }
        
        .tasks-footer {
            padding: 0.75rem;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="btn">+ New Bot</button>
            <button class="btn">👥 New Group Chat</button>
        </div>
        
        <div class="bots-list" id="botsList">
            <div class="bot-item">Bot 1 - Testing</div>
            <div class="bot-item">Bot 2 - Example</div>
            <div class="bot-item">Bot 3 - Demo</div>
            <div class="bot-item">Bot 4 - Sample</div>
            <div class="bot-item">Bot 5 - Test</div>
            <div class="bot-item">Bot 6 - Testing</div>
            <div class="bot-item">Bot 7 - Example</div>
            <div class="bot-item">Bot 8 - Demo</div>
        </div>
        
        <div class="tasks-footer">
            <button class="btn">🚀 Start Task</button>
            <button class="btn">📋 View Tasks</button>
        </div>
    </div>
    
    <script>
        // Check if localStorage has bots
        const saved = localStorage.getItem('ollama_bots');
        if (saved) {
            console.log('Found saved bots:', JSON.parse(saved));
            const bots = JSON.parse(saved);
            const botsList = document.getElementById('botsList');
            botsList.innerHTML = Object.values(bots).map(bot => 
                `<div class="bot-item">${bot.name} - ${bot.model}</div>`
            ).join('');
        } else {
            console.log('No saved bots found');
        }
    </script>
</body>
</html>
